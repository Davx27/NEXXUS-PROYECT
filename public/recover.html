<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexxus Pro - Recuperar Contraseña</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login_container">
        <section class="login_card">
            
            <div class="logo_area">
                <h1>NEXXUS<span>PRO</span></h1>
                <p class="brand_tagline">Recuperación de acceso</p>
            </div>
            
            <form id="recover_form">
                
                <p style="text-align: center; margin-bottom: 20px; font-size: 0.9rem; color: #555;">
                    Ingresa el correo electrónico asociado a tu cuenta y te enviaremos las instrucciones para restablecer tu contraseña.
                </p>

                <div class="input_group">
                    <label for="recover_email">Correo Electrónico</label>
                    <input type="email" id="recover_email" placeholder="correo@ejemplo.com" required>
                </div>

                <button type="submit" class="primary_button">ENVIAR ENLACE</button>
            </form>

            <div class="register_prompt">
                <p>¿Recordaste tu contraseña? <a href="index.html" class="register_link">Inicia sesión</a></p>
            </div>

        </section>
    </main>

</body>
</html>
